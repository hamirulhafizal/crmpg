name: CRMPGApp
options:
  bundleIdPrefix: com.publicgolds
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true

configs:
  Debug: debug
  Release: release

configFiles:
  Debug: Config/Debug.xcconfig
  Release: Config/Release.xcconfig

settings:
  base:
    SWIFT_VERSION: "6.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    INFOPLIST_KEY_CFBundleDisplayName: "Public Gold CRM"
    INFOPLIST_KEY_LSApplicationCategoryType: "public.app-category.business"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic

packages:
  Supabase:
    url: https://github.com/supabase/supabase-swift
    from: "2.0.0"

targets:
  CRMPGApp:
    type: application
    platform: iOS
    sources:
      - path: CRMPGApp
        excludes:
          - Info.plist
          - CRMPGApp.entitlements
      - path: Shared
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_NAME: CRMPGApp
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: CRMPGApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: CRMPGApp/CRMPGApp.entitlements
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
        INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
    dependencies:
      - package: Supabase
        product: Supabase
      - target: CRMPGWidgets
        embed: true
      - target: CRMPGKeyboard
        embed: true

  CRMPGWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: CRMPGWidgets
        excludes:
          - Info.plist
          - CRMPGWidgets.entitlements
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: CRMPGWidgets
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: CRMPGWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: CRMPGWidgets/CRMPGWidgets.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        INFOPLIST_KEY_CFBundleDisplayName: "Account Status"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.publicgolds.crmpg.debug.widgets
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.publicgolds.crmpg.widgets
    scheme: {}

  CRMPGKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: CRMPGKeyboard
        excludes:
          - Info.plist
          - CRMPGKeyboard.entitlements
      - path: Shared
    settings:
      base:
        PRODUCT_NAME: CRMPGKeyboard
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_FILE: CRMPGKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: CRMPGKeyboard/CRMPGKeyboard.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SKIP_INSTALL: YES
        INFOPLIST_KEY_CFBundleDisplayName: "PG CRM"
      configs:
        Debug:
          PRODUCT_BUNDLE_IDENTIFIER: com.publicgolds.crmpg.debug.keyboard
        Release:
          PRODUCT_BUNDLE_IDENTIFIER: com.publicgolds.crmpg.keyboard
    scheme: {}

schemes:
  CRMPGApp:
    build:
      targets:
        CRMPGApp: all
        CRMPGWidgets: all
        CRMPGKeyboard: all
    run:
      config: Debug
    archive:
      config: Release
