<!DOCTYPE html>
<html>
<head>
    <link href="style.css" rel="stylesheet" type="text/css">
</head>
<body>

<div class="login-page">
    <div id="accountLogin" class="form">
        <form id="loginForm" novalidate>
            <h2 class="form-title">Login</h2>
            <p class="form-hint">Use the same account as the webapp (Supabase)</p>
            <div class="input-wrap">
                <input id="login-email" type="email" placeholder="Email" name="login-email" autocomplete="email" class="input"/>
            </div>
            <div class="input-wrap input-wrap-password">
                <input id="login-password" type="password" placeholder="Password" name="login-password" autocomplete="current-password" class="input"/>
                <button type="button" id="togglePassword" class="password-toggle" title="Show password" aria-label="Show password">
                    <span class="icon-eye" aria-hidden="true"></span>
                </button>
            </div>
            <div class="remember_me" hidden>
                <input type="checkbox" tabindex="3" value="remember-me" id="remember_me" style="margin-right: 10px;" hidden>
                <label for="remember_me" style="margin-bottom: 15px;" hidden>Remember email</label>
            </div>
            <button name="login-button" type="button" id="loginButton" class="btn-primary">Sign In</button>

            <!-- <div class="divider"><span>Or continue with</span></div>
            <button type="button" id="googleSignInButton" class="btn-google">
                <span class="google-icon"></span> Sign in with Google
            </button> -->

            <p id="loginError" class="form-error form-error-main"></p>
            <p id="emailError" class="form-error"></p>
            <p id="passwordError" class="form-error"></p>
        </form>

        <div class="success">
            <h2 id="pgcode" style="margin-top: 0px"></h2>
            
            <button id="btn-download-customer" hidden>Download Customer</button>
        
            <button id="btn-download-sales" hidden>Download Personal Sales</button>
            <button id="btn-download-group-sales" hidden>Download Group Sales</button>
            <button id="btn-download-pgmall" hidden>Download PG Mall Data</button>
            <button id="btn-download-autodebit" hidden>Download GAP Autodebit</button>

            <!-- <hr style="margin: 20px 0;"> -->

            
            <div id="syncProgress" class="sync-progress" style="display: none;">
                <div class="sync-progress-bar"><div id="syncProgressFill" class="sync-progress-fill"></div></div>
                <p id="syncProgressText" class="sync-progress-text">Preparing...</p>
            </div>

            <button id="btn-sync-supabase" class="btn-sync" hidden>Sync to CRMPG</button>
            <button id="btn-sync-supabase-2" class="btn-sync">Sync to CRMPG</button>
            <!-- <button type="button" id="btn-test-confetti" class="btn-test-confetti">Test confetti</button> -->

            <button id="logout" style="margin-top: 20px">Logout</button>
        </div>

    </div>
</div>
<script src="js-confetti.browser.js"></script>
<script src="config.js"></script>
<script src="jquery.min.js"></script>
<script src="xlsx.full.min.js"></script>
<script src="login.js"></script>
<script src="background.js"></script>
</body>
</html>
