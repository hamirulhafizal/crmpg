name: Publish Chrome Extension

on:
  push:
    branches:
      - main
    paths:
      - 'extension/**'
      - 'scripts/build-extension-zip.mjs'
      - 'scripts/publish-chrome-extension.mjs'
      - '.github/workflows/publish-extension.yml'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate extension version
        run: |
          VERSION=$(node -pe "JSON.parse(require('fs').readFileSync('extension/ikfaidmmhokhgocfhhddhlahmbikjaed/manifest.json','utf8')).version")
          echo "Extension version: $VERSION"
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "manifest.json version must use semver (e.g. 1.0.1)"
            exit 1
          fi

      - name: Build extension zip
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          WEBAPP_ORIGIN: ${{ secrets.WEBAPP_ORIGIN }}
          CHROME_WEB_STORE_EXTENSION_URL: ${{ secrets.CHROME_WEB_STORE_EXTENSION_URL }}
        run: npm run extension:build

      - name: Publish to Chrome Web Store
        env:
          CHROME_EXTENSION_ID: ${{ secrets.CHROME_EXTENSION_ID }}
          CHROME_CLIENT_ID: ${{ secrets.CHROME_CLIENT_ID }}
          CHROME_CLIENT_SECRET: ${{ secrets.CHROME_CLIENT_SECRET }}
          CHROME_REFRESH_TOKEN: ${{ secrets.CHROME_REFRESH_TOKEN }}
        run: npm run extension:publish
